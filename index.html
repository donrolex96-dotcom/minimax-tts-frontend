<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MiniMax TTS Studio</title>

<style>
body {
  background:#0b0b0b;
  color:#fff;
  font-family: monospace;
  padding:20px;
}

textarea {
  width:100%;
  height:120px;
  background:#111;
  color:#fff;
  border:1px solid #333;
  padding:10px;
  font-family: monospace;
}

select, button {
  margin-top:10px;
  padding:10px;
  background:#111;
  color:#fff;
  border:1px solid #333;
  font-family: monospace;
  cursor:pointer;
}

button:hover {
  border-color:#0f0;
}

audio {
  width:100%;
  margin-top:20px;
}

#error {
  color:red;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🎤 MiniMax TTS Studio</h2>

<textarea id="text" placeholder="Type your text here..."></textarea>

<br>

<select id="voice">
  <option>Sae Chabashira</option>
  <option>Haruka San</option>
  <option>Father Assistant</option>
</select>

<br>

<button onclick="generate()">Generate Voice</button>

<div id="error"></div>

<audio id="player" controls></audio>

<script>
const API = "https://minimax-tts-backend-6e0z.onrender.com";

async function generate() {
    const text = document.getElementById("text").value.trim();
    const voice = document.getElementById("voice").value;
    const errorBox = document.getElementById("error");
    const player = document.getElementById("player");

    errorBox.innerText = "";
    player.src = "";

    if (!text) {
        errorBox.innerText = "⚠️ Please enter text";
        return;
    }

    try {
        const res = await fetch(API + "/generate-audio", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                lines: [{
                    text: text,
                    voice: voice
                }]
            })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.detail || "Server error");
        }

        if (!data.audio_base64) {
            throw new Error("No audio received");
        }

        // 🔥 SAFE PLAY
        player.src = data.audio_base64;
        await player.play();

    } catch (err) {
        errorBox.innerText = "❌ " + err.message;
    }
}
</script>

</body>
</html>
